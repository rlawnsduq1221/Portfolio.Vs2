<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Board · 김준엽</title>
  <style>
    /* ── index.html과 동일한 기본 변수 ── */
    * { box-sizing: border-box; margin: 0; padding: 0; text-decoration: none; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard', Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a:link, a:visited, a:active { color: inherit; text-decoration: none; }

    /* ── 헤더 (index.html 스타일 그대로) ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
      z-index: 50;
    }
    header h1 { font-size: 20px; font-weight: bold; margin: 0; }
    header h1 a { color: #4f46e5; }
    header .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 14px;
      color: #94a3b8;
    }
    header .header-right a {
      color: #94a3b8;
      transition: color 0.2s;
    }
    header .header-right a:hover { color: #fff; }
    .btn-return {
      border: 1px solid #4f46e5;
      color: #4f46e5 !important;
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 13px;
      font-weight: bold;
      transition: 0.2s !important;
    }
    .btn-return:hover { background: #4f46e5; color: #fff !important; }

    /* ── 2단 레이아웃 ── */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 사이드바 (index.html의 #1e293b, #334155 팔레트) ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #0d1526;
      border-right: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-top {
      padding: 14px 12px;
      border-bottom: 1px solid #1e293b;
    }
    /* index.html .btn-primary 스타일 참고 */
    .btn-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 9px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-new:hover { background: #4338ca; }

    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid #1e293b;
    }
    .sidebar-search input {
      width: 100%;
      padding: 7px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }
    .sidebar-search input:focus { border-color: #4f46e5; }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    /* index.html의 .tags span 색상 참고 */
    .sidebar-category {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    /* index.html의 ol li a 스타일 참고 */
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      margin: 1px 6px;
      border-radius: 6px;
      font-size: 13px;
      color: #94a3b8;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
    }
    .sidebar-item:hover { background: #1e293b; color: #e2e8f0; }
    .sidebar-item.active {
      background: rgba(79,70,229,0.15);
      color: #818cf8;
      border-color: rgba(79,70,229,0.3);
    }
    .sidebar-item .item-emoji { font-size: 15px; flex-shrink: 0; }
    .sidebar-item .item-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── 메인 콘텐츠 ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 탭바 (뷰/편집) ── */
    .tab-bar {
      display: flex;
      align-items: center;
      padding: 0 32px;
      border-bottom: 1px solid #1e293b;
      background: rgba(15,23,42,0.6);
      flex-shrink: 0;
      gap: 4px;
    }
    .tab-btn {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    .main-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 40px 48px 80px;
    }
    .main-scroll::-webkit-scrollbar { width: 6px; }
    .main-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }

    /* ── 빈 상태 ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      text-align: center;
      color: #475569;
    }
    .empty-state .empty-icon { font-size: 60px; margin-bottom: 20px; }
    .empty-state h2 { font-size: 22px; color: #64748b; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: #475569; line-height: 1.7; }
    .empty-state .btn-primary-lg {
      margin-top: 24px;
      padding: 11px 24px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .empty-state .btn-primary-lg:hover { background: #4338ca; }

    /* ── 페이지 헤더 ── */
    .page-header-area {
      max-width: 740px;
      margin-bottom: 28px;
    }
    .page-title-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .page-emoji-big { font-size: 44px; line-height: 1; }
    .page-title-text {
      font-size: 30px;
      font-weight: 700;
      color: #f1f5f9;
    }
    .page-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    /* index.html의 .tags span 스타일 */
    .cat-badge {
      background: rgba(79, 70, 229, 0.2);
      color: #818cf8;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .update-time { font-size: 12px; color: #475569; }
    .page-actions { display: flex; gap: 8px; }

    /* ── 버튼들 (index.html 버튼 스타일 참고) ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }
    .btn-edit { background: #1e293b; color: #818cf8; border: 1px solid #334155; }
    .btn-edit:hover { background: rgba(79,70,229,0.15); }
    .btn-delete { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }
    .btn-save { background: #4f46e5; color: #fff; }
    .btn-save:hover { background: #4338ca; }
    .btn-cancel { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-cancel:hover { background: #334155; }

    /* ── 마크다운 뷰 (index.html content-box 느낌) ── */
    .markdown-body {
      max-width: 740px;
      line-height: 1.85;
      color: #cbd5e1;
    }
    .markdown-body h1 {
      font-size: 26px; color: #f1f5f9;
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .markdown-body h2 { font-size: 20px; color: #e2e8f0; margin: 22px 0 10px; }
    .markdown-body h3 { font-size: 16px; color: #cbd5e1; margin: 18px 0 8px; }
    .markdown-body p { margin: 12px 0; }
    /* index.html의 ol li a 스타일 참고 */
    .markdown-body ul { padding-left: 22px; margin: 10px 0; }
    .markdown-body ol { padding-left: 22px; margin: 10px 0; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body strong { color: #f1f5f9; font-weight: 700; }
    .markdown-body em { color: #a5b4fc; }
    .markdown-body a { color: #818cf8; text-decoration: underline; }
    /* index.html input 스타일 참고 */
    .markdown-body code {
      background: #1e293b;
      color: #a5b4fc;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      border: 1px solid #334155;
    }
    .markdown-body pre {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 18px 20px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .markdown-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 13px;
    }
    .markdown-body blockquote {
      border-left: 3px solid #4f46e5;
      padding: 4px 16px;
      margin: 16px 0;
      color: #64748b;
      background: rgba(79,70,229,0.05);
      border-radius: 0 6px 6px 0;
    }
    .markdown-body hr { border: none; border-top: 1px solid #1e293b; margin: 24px 0; }
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    .markdown-body th {
      background: #1e293b;
      color: #818cf8;
      padding: 10px 14px;
      text-align: left;
      border: 1px solid #334155;
    }
    .markdown-body td {
      padding: 8px 14px;
      border: 1px solid #1e293b;
      color: #94a3b8;
    }
    .markdown-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* ── 에디터 ── */
    .editor-area { max-width: 740px; }
    .editor-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    /* index.html input 스타일과 동일 */
    .emoji-input {
      width: 56px;
      font-size: 26px;
      text-align: center;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 6px;
      outline: none;
    }
    .title-input {
      flex: 1;
      font-size: 26px;
      font-weight: 700;
      background: transparent;
      border: none;
      border-bottom: 2px solid #1e293b;
      color: #f1f5f9;
      padding: 6px 0;
      outline: none;
      transition: 0.2s;
    }
    .title-input:focus { border-bottom-color: #4f46e5; }
    .editor-meta {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }
    .cat-select, .new-cat-input {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .cat-select:focus, .new-cat-input:focus { border-color: #4f46e5; }
    /* index.html textarea와 동일 */
    .content-editor {
      width: 100%;
      min-height: 480px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Fira Code', monospace;
      line-height: 1.75;
      padding: 18px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    .content-editor:focus { border-color: #4f46e5; }
    .editor-footer {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }
    .shortcut-tip { font-size: 11px; color: #475569; margin-left: auto; }

    /* ── 로딩 스피너 ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #475569;
      font-size: 14px;
      gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #1e293b;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 토스트 알림 ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 999;
      animation: fadeUp 0.3s ease;
    }
    .toast.show { display: flex; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .sidebar { width: 190px; }
      .main-scroll { padding: 24px 20px 60px; }
      .page-title-text { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- 헤더 (index.html 동일 스타일) -->
  <header>
    <h1><a href="/">📚 Study Board</a></h1>
    <div class="header-right">
      <span id="saveStatus" style="color:#475569; font-size:12px;"></span>
      <a href="https://portfolio-vs2-lime.vercel.app" class="btn-return">← 포트폴리오</a>
    </div>
  </header>

  <div class="app-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="btn-new" onclick="openCreate()">＋ 새 페이지</button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="🔍 검색...">
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
      </nav>
    </aside>

    <!-- 메인 -->
    <div class="main">
      <div class="tab-bar" id="tabBar" style="display:none;">
        <button class="tab-btn active" id="tabView" onclick="switchTab('view')">👁 보기</button>
        <button class="tab-btn" id="tabEdit" onclick="switchTab('edit')">✏️ 편집</button>
      </div>
      <div class="main-scroll" id="mainContent">
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <h2>Study Board</h2>
          <p>왼쪽에서 페이지를 선택하거나<br>새 페이지를 만들어보세요.</p>
          <button class="btn-primary-lg" onclick="openCreate()">+ 첫 페이지 만들기</button>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'http://localhost:3001/api';
    let allPages = [];
    let allCategories = [];
    let currentPage = null;
    let currentTab = 'view';

    // ── 초기 로드 ──────────────────────────────
    async function loadAll() {
      try {
        const res = await fetch(`${API}/pages`);
        const data = await res.json();
        allPages = data.pages || [];
        allCategories = data.categories || [];
        renderSidebar();
      } catch {
        document.getElementById('sidebarNav').innerHTML =
          '<div style="padding:16px;color:#ef4444;font-size:12px;">⚠️ 서버에 연결할 수 없습니다.<br>node study.js 를 실행해주세요.</div>';
      }
    }

    // ── 사이드바 렌더 ───────────────────────────
    function renderSidebar() {
      const nav = document.getElementById('sidebarNav');
      const q = document.getElementById('searchInput').value.toLowerCase();

      const filtered = q
        ? allPages.filter(p => p.title.toLowerCase().includes(q) || (p.content||'').toLowerCase().includes(q))
        : allPages;

      if (filtered.length === 0) {
        nav.innerHTML = '<div style="padding:20px 16px;color:#475569;font-size:13px;">페이지가 없습니다.</div>';
        return;
      }

      const catMap = {};
      filtered.forEach(p => {
        const c = p.category || '일반';
        if (!catMap[c]) catMap[c] = [];
        catMap[c].push(p);
      });

      let html = '';
      for (const cat of Object.keys(catMap)) {
        html += `<div class="sidebar-category">${esc(cat)}</div>`;
        catMap[cat].forEach(p => {
          const active = currentPage && currentPage.id === p.id ? 'active' : '';
          html += `
            <div class="sidebar-item ${active}" onclick="selectPage('${p.id}')">
              <span class="item-emoji">${esc(p.emoji||'📄')}</span>
              <span class="item-label">${esc(p.title)}</span>
            </div>`;
        });
      }
      nav.innerHTML = html;
    }

    // ── 페이지 선택 ─────────────────────────────
    async function selectPage(id) {
      try {
        const res = await fetch(`${API}/pages/${id}`);
        currentPage = await res.json();
        currentTab = 'view';
        renderMain();
        renderSidebar();
        document.getElementById('tabBar').style.display = 'flex';
        setTab('view');
      } catch {
        showToast('⚠️ 페이지를 불러오지 못했습니다.');
      }
    }

    // ── 탭 전환 ────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      setTab(tab);
      renderMain();
    }
    function setTab(tab) {
      document.getElementById('tabView').classList.toggle('active', tab==='view');
      document.getElementById('tabEdit').classList.toggle('active', tab==='edit');
    }

    // ── 메인 렌더 ───────────────────────────────
    function renderMain() {
      const el = document.getElementById('mainContent');
      if (!currentPage) return;
      if (currentTab === 'edit') {
        el.innerHTML = renderEditor(currentPage);
        initEditorEvents();
      } else {
        el.innerHTML = renderView(currentPage);
      }
    }

    // ── 뷰 모드 ────────────────────────────────
    function renderView(page) {
      const date = new Date(page.updatedAt).toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
      return `
        <div class="page-header-area">
          <div class="page-title-row">
            <span class="page-emoji-big">${esc(page.emoji||'📄')}</span>
            <h1 class="page-title-text">${esc(page.title)}</h1>
          </div>
          <div class="page-meta-row">
            <span class="cat-badge">${esc(page.category||'일반')}</span>
            <span class="update-time">마지막 수정: ${date}</span>
          </div>
          <div class="page-actions">
            <button class="btn btn-edit" onclick="switchTab('edit')">✏️ 편집</button>
            <button class="btn btn-delete" onclick="deletePage('${page.id}')">🗑 삭제</button>
          </div>
        </div>
        <div class="markdown-body">${mdToHtml(page.content||'')}</div>`;
    }

    // ── 편집 모드 ───────────────────────────────
    function renderEditor(page) {
      const catOpts = allCategories.map(c =>
        `<option value="${esc(c)}" ${c===page.category?'selected':''}>${esc(c)}</option>`
      ).join('');
      return `
        <div class="editor-area">
          <div class="editor-top">
            <input class="emoji-input" id="edEmoji" value="${esc(page.emoji||'📄')}" maxlength="4">
            <input class="title-input" id="edTitle" value="${esc(page.title)}" placeholder="페이지 제목...">
          </div>
          <div class="editor-meta">
            <select class="cat-select" id="edCat">
              ${catOpts}
              <option value="__new__">+ 새 카테고리</option>
            </select>
            <input class="new-cat-input" id="edNewCat" placeholder="새 카테고리 이름" style="display:none;">
          </div>
          <textarea class="content-editor" id="edContent">${esc(page.content||'')}</textarea>
          <div class="editor-footer">
            <button class="btn btn-save" onclick="savePage()">💾 저장</button>
            <button class="btn btn-cancel" onclick="switchTab('view')">취소</button>
            <span class="shortcut-tip">Ctrl+S 로 저장</span>
          </div>
        </div>`;
    }

    // ── 새 페이지 폼 ────────────────────────────
    function openCreate() {
      currentPage = null;
      currentTab = 'edit';
      document.getElementById('tabBar').style.display = 'flex';
      setTab('edit');
      const catOpts = allCategories.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      document.getElementById('mainContent').innerHTML = `
        <div class="editor-area">
          <div class="editor-top">
            <input class="emoji-input" id="edEmoji" value="📄" maxlength="4">
            <input class="title-input" id="edTitle" placeholder="페이지 제목..." autofocus>
          </div>
          <div class="editor-meta">
            <select class="cat-select" id="edCat">
              ${catOpts}
              <option value="__new__">+ 새 카테고리</option>
            </select>
            <input class="new-cat-input" id="edNewCat" placeholder="새 카테고리 이름" style="display:none;">
          </div>
          <textarea class="content-editor" id="edContent" placeholder="마크다운으로 작성하세요...
# 제목
## 소제목
**굵게**, *기울임*, \`코드\`
\`\`\`js
// 코드 블록
\`\`\`"></textarea>
          <div class="editor-footer">
            <button class="btn btn-save" onclick="createPage()">💾 저장</button>
            <button class="btn btn-cancel" onclick="cancelCreate()">취소</button>
            <span class="shortcut-tip">Ctrl+S 로 저장</span>
          </div>
        </div>`;
      initEditorEvents();
    }

    function cancelCreate() {
      document.getElementById('tabBar').style.display = 'none';
      document.getElementById('mainContent').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📚</div>
          <h2>Study Board</h2>
          <p>왼쪽에서 페이지를 선택하거나<br>새 페이지를 만들어보세요.</p>
          <button class="btn-primary-lg" onclick="openCreate()">+ 새 페이지 만들기</button>
        </div>`;
    }

    function initEditorEvents() {
      const catSel = document.getElementById('edCat');
      const newCatInput = document.getElementById('edNewCat');
      if (catSel && newCatInput) {
        catSel.addEventListener('change', () => {
          newCatInput.style.display = catSel.value === '__new__' ? 'block' : 'none';
          if (catSel.value === '__new__') newCatInput.focus();
        });
      }
    }

    // ── CRUD ────────────────────────────────────
    async function createPage() {
      const title = document.getElementById('edTitle')?.value.trim();
      if (!title) { showToast('⚠️ 제목을 입력해주세요.'); return; }

      let category = document.getElementById('edCat')?.value;
      const newCat = document.getElementById('edNewCat')?.value.trim();
      if (category === '__new__' && newCat) category = newCat;

      const body = {
        title,
        emoji: document.getElementById('edEmoji')?.value || '📄',
        category: category || '일반',
        content: document.getElementById('edContent')?.value || ''
      };
      try {
        const res = await fetch(`${API}/pages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const page = await res.json();
        await loadAll();
        currentPage = page;
        currentTab = 'view';
        renderMain();
        document.getElementById('tabBar').style.display = 'flex';
        setTab('view');
        renderSidebar();
        showToast('✅ 저장되었습니다!');
      } catch { showToast('⚠️ 저장에 실패했습니다.'); }
    }

    async function savePage() {
      if (!currentPage) return;
      let category = document.getElementById('edCat')?.value;
      const newCat = document.getElementById('edNewCat')?.value.trim();
      if (category === '__new__' && newCat) category = newCat;

      const body = {
        title: document.getElementById('edTitle')?.value.trim() || currentPage.title,
        emoji: document.getElementById('edEmoji')?.value || currentPage.emoji,
        category: category || currentPage.category,
        content: document.getElementById('edContent')?.value ?? currentPage.content
      };
      try {
        const res = await fetch(`${API}/pages/${currentPage.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        currentPage = await res.json();
        await loadAll();
        currentTab = 'view';
        renderMain();
        setTab('view');
        renderSidebar();
        showToast('✅ 저장되었습니다!');
      } catch { showToast('⚠️ 저장에 실패했습니다.'); }
    }

    async function deletePage(id) {
      if (!confirm('정말 삭제하시겠습니까?')) return;
      try {
        await fetch(`${API}/pages/${id}`, { method: 'DELETE' });
        currentPage = null;
        await loadAll();
        document.getElementById('tabBar').style.display = 'none';
        cancelCreate();
        showToast('🗑 삭제되었습니다.');
      } catch { showToast('⚠️ 삭제에 실패했습니다.'); }
    }

    // ── 마크다운 → HTML ─────────────────────────
    function mdToHtml(text) {
      let t = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // 코드 블록
      t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>');
      // 인라인 코드
      t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      // 제목
      t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
      t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
      // 수평선
      t = t.replace(/^---$/gm, '<hr>');
      // 인용
      t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      // 굵게 / 기울임
      t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // 링크
      t = t.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
      // 리스트
      t = t.replace(/^- (.+)$/gm, '<li>$1</li>');
      t = t.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
      // 번호 리스트
      t = t.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      // 줄바꿈 → 단락
      t = t.replace(/\n\n/g, '</p><p>');
      t = '<p>' + t + '</p>';
      t = t.replace(/<p>\s*(<(?:h[123]|ul|ol|pre|hr|blockquote))/g, '$1');
      t = t.replace(/(<\/(?:h[123]|ul|ol|pre|hr|blockquote)>)\s*<\/p>/g, '$1');
      t = t.replace(/<p>\s*<\/p>/g, '');
      return t;
    }

    // ── 유틸 ────────────────────────────────────
    function esc(s) {
      return String(s||'')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── 이벤트 ──────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', renderSidebar);

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (currentTab === 'edit') {
          currentPage ? savePage() : createPage();
        }
      }
    });

    loadAll();
  </script>
</body>
</html>
